<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Inventory</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }
    button {
      background: #4285f4;
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      margin: 0.5rem 0;
      width: 100%;
    }
    button:hover { background: #3367d6; }
    #logoutBtn {
      background: #e74c3c;
      display: none;
    }
    #logoutBtn:hover { background: #c0392b; }
    .user-info {
      margin-top: 1rem;
      display: none;
    }
    .user-info img {
      border-radius: 50%;
      width: 72px;
      height: 72px;
      margin-bottom: 0.5rem;
    }
    .muted {
      color: #666;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Smart Inventory</h1>
    <p class="muted">Inicia sesion para continuar</p>

    <button id="google-signin">Iniciar sesion con Google</button>
    <button id="logoutBtn">Cerrar sesion</button>

    <div class="user-info" id="userInfo">
      <img id="userPhoto" src="" alt="Foto de usuario"/>
      <h3 id="userName"></h3>
      <p id="userEmail" class="muted"></p>
    </div>
  </div>

  <script type="module" src="js/firebaseConfig.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
